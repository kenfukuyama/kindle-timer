<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Split Timer</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #ffffff;
    color: #000000;
    font-family: "Courier New", monospace;
  }
  /*
    The app is rotated 90 degrees clockwise (Version B) so the content reads
    upright with the screen's left edge at the bottom (landscape use on the
    Kindle). Old Kindle WebKit has no vh/vw units and ignores the Fullscreen
    / orientation APIs, so the pixel size + rotate transform are set from JS
    (rotateApp). The whole screen is filled with a CSS table layout because
    that WebKit has no flexbox: the clock row expands to take all remaining
    height, and the button row is anchored to the bottom.
  */
  #wrap {
    position: absolute;
    top: 0;
    left: 0;
    padding: 16px;
    overflow: hidden;
    -webkit-transform-origin: top left;
    transform-origin: top left;
  }
  #layout {
    display: table;
    width: 100%;
    height: 100%;
    table-layout: fixed;
  }
  #clockRow, #btnRow {
    display: table-row;
  }
  #clockCell {
    display: table-cell;
    height: 100%;
    vertical-align: middle;
    text-align: center;
  }
  #btnCell {
    display: table-cell;
    vertical-align: bottom;
  }
  #total {
    font-size: 92px;
    font-weight: bold;
    letter-spacing: 2px;
    padding-bottom: 20px;
  }
  #clock {
    font-size: 240px;
    font-weight: bold;
    letter-spacing: 2px;
    line-height: 1;
  }
  #buttons {
    display: table;
    width: 100%;
    table-layout: fixed;
    border-collapse: separate;
    border-spacing: 14px 0;
  }
  .btn {
    display: table-cell;
    width: 50%;
    height: 240px;
    font-size: 60px;
    font-weight: bold;
    text-align: center;
    border: 2px solid #000000;
    background: #ffffff;
    color: #000000;
    vertical-align: middle;
  }
  /* Recent laps shown inside the Lap button (replaces the flag for 10s). */
  #lapBtn .lapline {
    font-size: 38px;
    font-weight: bold;
    line-height: 1.3;
    letter-spacing: 1px;
  }
  /* Invisible tap zone across the top of the (rotated) content that toggles
     the full lap-history overlay. */
  #historyTap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 160px;
    z-index: 20;
  }
  #history {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    padding: 40px;
    overflow-y: auto;
    z-index: 15;
  }
  #history div {
    font-size: 54px;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 14px 4px;
    border-bottom: 2px solid #000000;
    text-align: center;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="layout">
    <div id="clockRow">
      <div id="clockCell">
        <div id="total" onclick="confirmReset()">00:00</div>
        <div id="clock" onclick="armReset()">00:00</div>
      </div>
    </div>
    <div id="btnRow">
      <div id="btnCell">
        <div id="buttons">
          <div class="btn" id="startBtn" onclick="toggleStart()">&#9654;</div>
          <div class="btn" id="lapBtn" onclick="recordLap()">&#9873;</div>
        </div>
      </div>
    </div>
  </div>
  <div id="historyTap" onclick="toggleHistory()"></div>
  <div id="history" onclick="hideHistory()"></div>
</div>

<script>
  var running = false;
  var startTime = 0;
  var totalBeforePause = 0;
  var splitBeforePause = 0;
  var tickHandle = null;
  var laps = [];
  var LAPS_SHOWN = 3;
  var lapsHideTimer = null;
  var lapsVisible = false;
  var resetArmed = false;
  var resetArmTimer = null;
  var FLAG = "\u2691";

  function formatTime(ms) {
    var totalSeconds = Math.floor(ms / 1000);
    var hours = Math.floor(totalSeconds / 3600);
    var minutes = Math.floor((totalSeconds % 3600) / 60);
    var seconds = totalSeconds % 60;
    function pad(n) { return n < 10 ? "0" + n : "" + n; }
    // Only show the hours segment once past the 1 hour mark.
    if (hours > 0) {
      return hours + ":" + pad(minutes) + ":" + pad(seconds);
    }
    return pad(minutes) + ":" + pad(seconds);
  }

  // The total and split clocks advance together while running; they differ
  // only in when they were last reset to zero.
  function currentTotal() {
    if (running) {
      return totalBeforePause + (Date.now() - startTime);
    }
    return totalBeforePause;
  }

  function currentSplit() {
    if (running) {
      return splitBeforePause + (Date.now() - startTime);
    }
    return splitBeforePause;
  }

  function updateClock() {
    var splitStr = formatTime(currentSplit());
    var clockEl = document.getElementById("clock");
    clockEl.innerHTML = splitStr;
    // Shrink the big split clock only once hours appear so it never
    // overflows the width; keep it huge for the common MM:SS case.
    clockEl.style.fontSize = (splitStr.length > 5 ? "170px" : "240px");
    document.getElementById("total").innerHTML = formatTime(currentTotal());
  }

  function setStartLabel(isRunning) {
    var btn = document.getElementById("startBtn");
    // U+25A0 (stop square) while running, U+25B6 (play) while stopped.
    btn.innerHTML = isRunning ? "\u25A0" : "\u25B6";
  }

  // The Lap button shows the flag by default, or the recent laps for 10s
  // after any button press.
  function renderLapButton() {
    var btn = document.getElementById("lapBtn");
    if (!lapsVisible || laps.length === 0) {
      btn.innerHTML = FLAG;
      return;
    }
    var html = "";
    var minIndex = laps.length - LAPS_SHOWN;
    if (minIndex < 0) { minIndex = 0; }
    for (var i = laps.length - 1; i >= minIndex; i--) {
      html += "<div class='lapline'>Lap " + (i + 1) + "  " +
        formatTime(laps[i]) + "</div>";
    }
    btn.innerHTML = html;
  }

  // Reveal recent laps inside the Lap button and (re)start the 10s auto-hide.
  function showLaps() {
    lapsVisible = true;
    renderLapButton();
    if (lapsHideTimer) { clearTimeout(lapsHideTimer); }
    lapsHideTimer = setTimeout(hideLaps, 10000);
  }

  function hideLaps() {
    lapsVisible = false;
    renderLapButton();
  }

  // Button 1: Start when stopped, Stop when running.
  function toggleStart() {
    if (!running) {
      running = true;
      startTime = Date.now();
      setStartLabel(true);
      tickHandle = setInterval(updateClock, 1000);
    } else {
      // Capture both clocks while still running, then stop.
      totalBeforePause = currentTotal();
      splitBeforePause = currentSplit();
      running = false;
      clearInterval(tickHandle);
      setStartLabel(false);
      updateClock();
    }
    showLaps();
  }

  // Button 2: Lap. Records the current split, then pauses both timers and
  // resets the split back to 0, leaving the total frozen at its value.
  function recordLap() {
    var split = currentSplit();
    if (split > 0) {
      laps.push(split);
    }
    totalBeforePause = currentTotal();
    splitBeforePause = 0;
    running = false;
    clearInterval(tickHandle);
    setStartLabel(false);
    updateClock();
    showLaps();
  }

  // Reset is a two-step gesture: tap the main clock to "arm" it, then tap
  // the total counter to confirm. The armed state expires after 3s.
  function armReset() {
    resetArmed = true;
    if (resetArmTimer) { clearTimeout(resetArmTimer); }
    resetArmTimer = setTimeout(function () { resetArmed = false; }, 3000);
  }

  function confirmReset() {
    if (resetArmed) {
      resetArmed = false;
      if (resetArmTimer) { clearTimeout(resetArmTimer); }
      resetAll();
    }
  }

  // Reset: zeroes both timers, clears laps, and stops.
  function resetAll() {
    running = false;
    clearInterval(tickHandle);
    totalBeforePause = 0;
    splitBeforePause = 0;
    laps = [];
    setStartLabel(false);
    updateClock();
    if (lapsHideTimer) { clearTimeout(lapsHideTimer); }
    hideLaps();
  }

  // Top tap toggles a full-history overlay (all laps, newest on top).
  function toggleHistory() {
    var h = document.getElementById("history");
    if (h.style.display === "block") {
      h.style.display = "none";
      return;
    }
    var html = "";
    if (laps.length === 0) {
      html = "<div>No laps yet</div>";
    } else {
      for (var i = laps.length - 1; i >= 0; i--) {
        html += "<div>Lap " + (i + 1) + "  " + formatTime(laps[i]) + "</div>";
      }
    }
    h.innerHTML = html;
    h.style.display = "block";
  }

  function hideHistory() {
    document.getElementById("history").style.display = "none";
  }

  // Rotate the app 90 degrees clockwise (Version B) so the content reads
  // upright with the left edge at the bottom. Sized in pixels because the
  // old Kindle browser has no vh/vw units and ignores the Fullscreen /
  // orientation APIs.
  function rotateApp() {
    var wrap = document.getElementById("wrap");
    var de = document.documentElement;
    // Read the viewport defensively; fall back to the Paperwhite 4's real
    // visible CSS viewport (~758 x 899) if the browser reports nothing.
    var w = window.innerWidth || de.clientWidth || 758;
    var h = window.innerHeight || de.clientHeight || 899;
    // After a 90deg rotation the box's width/height are swapped.
    wrap.style.width = h + "px";
    wrap.style.height = w + "px";
    var t = "translateX(" + w + "px) rotate(90deg)";
    wrap.style.webkitTransform = t;
    wrap.style.transform = t;
  }

  window.onresize = rotateApp;

  rotateApp();
  updateClock();
  renderLapButton();
</script>
</body>
</html>
