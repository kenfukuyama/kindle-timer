<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Stopwatch</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #ffffff;
    color: #000000;
    font-family: "Courier New", monospace;
  }
  /*
    The app is rotated 90 degrees counter-clockwise so the screen's LEFT
    edge becomes the BOTTOM (landscape use on the Kindle). Old Kindle
    WebKit has no vh/vw units and ignores the Fullscreen / orientation
    APIs, so the pixel size + rotate transform are set from JS (rotateApp).
    Layout uses block flow + CSS tables because that WebKit has no flexbox.
  */
  #wrap {
    position: absolute;
    top: 0;
    left: 0;
    padding: 20px;
    overflow: hidden;
    -webkit-transform-origin: top left;
    transform-origin: top left;
  }
  #clock {
    text-align: center;
    font-size: 96px;
    font-weight: bold;
    letter-spacing: 2px;
    padding: 70px 0 60px 0;
  }
  #buttons {
    display: table;
    width: 100%;
    table-layout: fixed;
    border-collapse: separate;
    border-spacing: 12px 0;
  }
  .btn {
    display: table-cell;
    width: 33%;
    padding: 26px 0;
    font-size: 24px;
    text-align: center;
    border: 2px solid #000000;
    background: #ffffff;
    color: #000000;
    vertical-align: middle;
  }
  .btn.active {
    background: #000000;
    color: #ffffff;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="clock">00:00:00</div>
  <div id="buttons">
    <div class="btn" id="startBtn" onclick="startTimer()">Start</div>
    <div class="btn" id="stopBtn" onclick="stopTimer()">Stop</div>
    <div class="btn" id="resetBtn" onclick="resetTimer()">Reset</div>
  </div>
</div>

<script>
  var running = false;
  var startTime = 0;
  var elapsedBeforePause = 0;
  var tickHandle = null;

  function formatTime(ms) {
    var totalSeconds = Math.floor(ms / 1000);
    var hours = Math.floor(totalSeconds / 3600);
    var minutes = Math.floor((totalSeconds % 3600) / 60);
    var seconds = totalSeconds % 60;
    function pad(n) { return n < 10 ? "0" + n : "" + n; }
    return pad(hours) + ":" + pad(minutes) + ":" + pad(seconds);
  }

  function currentElapsed() {
    if (running) {
      return elapsedBeforePause + (Date.now() - startTime);
    }
    return elapsedBeforePause;
  }

  function updateClock() {
    document.getElementById("clock").innerHTML = formatTime(currentElapsed());
  }

  function startTimer() {
    if (running) { return; }
    running = true;
    startTime = Date.now();
    document.getElementById("startBtn").className = "btn active";
    tickHandle = setInterval(updateClock, 1000);
  }

  function stopTimer() {
    if (!running) { return; }
    // Capture elapsed time while still running, then stop the clock.
    elapsedBeforePause = currentElapsed();
    running = false;
    clearInterval(tickHandle);
    document.getElementById("startBtn").className = "btn";
    updateClock();
  }

  function resetTimer() {
    running = false;
    clearInterval(tickHandle);
    elapsedBeforePause = 0;
    document.getElementById("startBtn").className = "btn";
    updateClock();
  }

  // Rotate the app 90 degrees counter-clockwise so the screen's left edge
  // becomes the bottom. Sized in pixels because the old Kindle browser has
  // no vh/vw units and ignores the Fullscreen / orientation APIs.
  function rotateApp() {
    var wrap = document.getElementById("wrap");
    var de = document.documentElement;
    // Read the viewport defensively; fall back to the Paperwhite 4's real
    // visible CSS viewport (~758 x 899) if the browser reports nothing.
    var w = window.innerWidth || de.clientWidth || 758;
    var h = window.innerHeight || de.clientHeight || 899;
    // After a -90deg rotation the box's width/height are swapped.
    wrap.style.width = h + "px";
    wrap.style.height = w + "px";
    var t = "translateY(" + h + "px) rotate(-90deg)";
    wrap.style.webkitTransform = t;
    wrap.style.transform = t;
  }

  window.onresize = rotateApp;

  rotateApp();
  updateClock();
</script>
</body>
</html>
