<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Split Timer</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #ffffff;
    color: #000000;
    font-family: "Courier New", monospace;
  }
  /*
    The app is rotated 90 degrees clockwise (Version B) so the content reads
    upright with the screen's left edge at the bottom (landscape use on the
    Kindle). Old Kindle WebKit has no vh/vw units and ignores the Fullscreen
    / orientation APIs, so the pixel size + rotate transform are set from JS
    (rotateApp). The whole screen is filled with a CSS table layout because
    that WebKit has no flexbox: the clock row expands to take all remaining
    height, and the button row is anchored to the bottom.
  */
  #wrap {
    position: absolute;
    top: 0;
    left: 0;
    padding: 16px;
    overflow: hidden;
    -webkit-transform-origin: top left;
    transform-origin: top left;
  }
  #layout {
    display: table;
    width: 100%;
    height: 100%;
    table-layout: fixed;
  }
  #clockRow, #btnRow {
    display: table-row;
  }
  #clockCell {
    display: table-cell;
    height: 100%;
    vertical-align: middle;
    text-align: center;
  }
  #btnCell {
    display: table-cell;
    vertical-align: bottom;
  }
  #total {
    font-size: 120px;
    font-weight: bold;
    letter-spacing: 2px;
    padding-bottom: 16px;
  }
  #clock {
    font-size: 280px;
    font-weight: bold;
    letter-spacing: 2px;
    line-height: 1;
  }
  #buttons {
    display: table;
    width: 100%;
    table-layout: fixed;
    border-collapse: separate;
    border-spacing: 14px 0;
  }
  .btn {
    display: table-cell;
    width: 50%;
    height: 240px;
    font-size: 60px;
    font-weight: bold;
    text-align: center;
    border: 2px solid #000000;
    background: #ffffff;
    color: #000000;
    vertical-align: middle;
  }
  /* Recent laps shown inside the Lap button (replaces the flag for 10s). */
  #lapBtn .lapline {
    font-size: 54px;
    font-weight: bold;
    line-height: 1.25;
    letter-spacing: 1px;
  }
  /* Invisible tap zone across the top of the (rotated) content that toggles
     the full lap-history overlay. */
  #historyTap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 160px;
    z-index: 20;
  }
  #history {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    padding: 40px;
    overflow-y: auto;
    z-index: 15;
  }
  #history div, #adjust div {
    font-size: 54px;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 14px 4px;
    border-bottom: 2px solid #000000;
    text-align: center;
  }
  /* Action rows in the lap / adjust menus (larger tap targets). */
  #history .menuBtn, #adjust .menuBtn {
    font-size: 54px;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 28px 8px;
    margin: 16px 0;
    border: 2px solid #000000;
    border-bottom: 2px solid #000000;
    text-align: center;
    background: #ffffff;
  }
  #history .menuTitle, #adjust .menuTitle {
    font-size: 48px;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 8px 4px 24px 4px;
    border-bottom: none;
    text-align: center;
  }
  /* Read-only current-total line shown at the top of the menus. */
  #history .menuInfo, #adjust .menuInfo {
    font-size: 54px;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 4px 4px 24px 4px;
    border-bottom: none;
    text-align: center;
  }
  #adjust {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    padding: 24px;
    overflow-y: auto;
    /* Must sit above #historyTap (z-index 20) so its top buttons are
       tappable; the X button is used to close it. */
    z-index: 30;
  }
  #adjust .menuInfo {
    font-size: 64px;
    padding: 10px 4px 20px 4px;
  }
  /* Top row: X on the right, Total centered (a matching-width spacer on
     the left keeps Total visually centered). */
  #adjust .topRow {
    display: table;
    width: 100%;
    table-layout: fixed;
    border-collapse: separate;
    border-spacing: 16px 0;
    margin: 4px 0 16px 0;
    border-bottom: none;
  }
  #adjust .topRow .topCell {
    display: table-cell;
    vertical-align: middle;
    text-align: center;
    font-size: 64px;
    font-weight: bold;
    border-bottom: none;
  }
  #adjust .topRow .topSide {
    width: 180px;
  }
  #adjust .topRow .topX {
    border: 2px solid #000000;
    padding: 30px 4px;
  }
  /* A row of equal-width buttons (presets, +/- steps, confirm/cancel). */
  #adjust .stepRow {
    display: table;
    width: 100%;
    table-layout: fixed;
    border-collapse: separate;
    border-spacing: 16px 0;
    margin: 16px 0;
    border-bottom: none;
    padding: 0;
  }
  #adjust .stepRow .stepBtn {
    display: table-cell;
    vertical-align: middle;
    text-align: center;
    font-size: 64px;
    font-weight: bold;
    letter-spacing: 0;
    border: 2px solid #000000;
    padding: 44px 4px;
  }
  /* Small square cancel (X) button in the confirm row. */
  #adjust .stepRow .cancelBtn {
    width: 180px;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="layout">
    <div id="clockRow">
      <div id="clockCell">
        <div id="total" onclick="confirmReset()"><span id="totalText">00:00</span></div>
        <div id="clock" onclick="armReset()"><span id="clockText">00:00</span></div>
      </div>
    </div>
    <div id="btnRow">
      <div id="btnCell">
        <div id="buttons">
          <div class="btn" id="startBtn" onclick="toggleStart()">&#9654;</div>
          <div class="btn" id="lapBtn" onclick="recordLap()">&#9873;</div>
        </div>
      </div>
    </div>
  </div>
  <div id="historyTap" onclick="toggleHistory()"></div>
  <div id="history" onclick="hideHistory()"></div>
  <div id="adjust"></div>
</div>

<script>
  var running = false;
  var startTime = 0;
  var totalBeforePause = 0;
  var splitBeforePause = 0;
  var tickHandle = null;
  var laps = [];
  var LAPS_SHOWN = 3;
  var lapsHideTimer = null;
  var lapsVisible = false;
  var resetArmed = false;
  var resetArmTimer = null;
  var FLAG = "\u2691";
  var availWidth = 800;
  var lastSplitLen = -1;
  var lastTotalLen = -1;
  // Draft total used while fine-tuning in the Adjust stopwatch menu.
  var adjustDraftMs = 0;

  function formatTime(ms) {
    var totalSeconds = Math.floor(ms / 1000);
    var hours = Math.floor(totalSeconds / 3600);
    var minutes = Math.floor((totalSeconds % 3600) / 60);
    var seconds = totalSeconds % 60;
    function pad(n) { return n < 10 ? "0" + n : "" + n; }
    // Only show the hours segment once past the 1 hour mark.
    if (hours > 0) {
      return hours + ":" + pad(minutes) + ":" + pad(seconds);
    }
    return pad(minutes) + ":" + pad(seconds);
  }

  // The total and split clocks advance together while running; they differ
  // only in when they were last reset to zero.
  function currentTotal() {
    if (running) {
      return totalBeforePause + (Date.now() - startTime);
    }
    return totalBeforePause;
  }

  function currentSplit() {
    if (running) {
      return splitBeforePause + (Date.now() - startTime);
    }
    return splitBeforePause;
  }

  // Size a number so its text fills the given fraction of the content width.
  // Measured at a 100px base so it works regardless of the font's metrics.
  function fitText(boxId, spanId, fraction) {
    var box = document.getElementById(boxId);
    var span = document.getElementById(spanId);
    box.style.fontSize = "100px";
    var measured = span.offsetWidth;
    if (measured > 0) {
      box.style.fontSize = Math.floor(100 * availWidth * fraction / measured) + "px";
    }
  }

  function updateClock() {
    var splitStr = formatTime(currentSplit());
    document.getElementById("clockText").innerHTML = splitStr;
    var totalStr = formatTime(currentTotal());
    document.getElementById("totalText").innerHTML = totalStr;
    // Refit only when the digit count changes (monospace width is otherwise
    // constant) so we don't reflow every second on the e-ink screen.
    if (splitStr.length !== lastSplitLen) {
      lastSplitLen = splitStr.length;
      fitText("clock", "clockText", 0.98);
    }
    if (totalStr.length !== lastTotalLen) {
      lastTotalLen = totalStr.length;
      fitText("total", "totalText", 0.5);
    }
    // Keep the menu's "Total" readout in sync while a menu is open.
    var historyTotal = document.getElementById("historyTotal");
    if (historyTotal) { historyTotal.innerHTML = totalStr; }
    var adjustTotal = document.getElementById("adjustTotal");
    if (adjustTotal) { adjustTotal.innerHTML = totalStr; }
  }

  function setStartLabel(isRunning) {
    var btn = document.getElementById("startBtn");
    // U+25A0 (stop square) while running, U+25B6 (play) while stopped.
    btn.innerHTML = isRunning ? "\u25A0" : "\u25B6";
  }

  // The Lap button shows the flag by default, or the recent laps for 10s
  // after any button press.
  function renderLapButton() {
    var btn = document.getElementById("lapBtn");
    if (!lapsVisible || laps.length === 0) {
      btn.innerHTML = FLAG;
      return;
    }
    var html = "";
    var minIndex = laps.length - LAPS_SHOWN;
    if (minIndex < 0) { minIndex = 0; }
    for (var i = laps.length - 1; i >= minIndex; i--) {
      html += "<div class='lapline'>Lap " + (i + 1) + "  " +
        formatTime(laps[i]) + "</div>";
    }
    btn.innerHTML = html;
  }

  // Reveal recent laps inside the Lap button and (re)start the 10s auto-hide.
  function showLaps() {
    lapsVisible = true;
    renderLapButton();
    if (lapsHideTimer) { clearTimeout(lapsHideTimer); }
    lapsHideTimer = setTimeout(hideLaps, 10000);
  }

  function hideLaps() {
    lapsVisible = false;
    renderLapButton();
  }

  // Button 1: Start when stopped, Stop when running.
  function toggleStart() {
    if (!running) {
      running = true;
      startTime = Date.now();
      setStartLabel(true);
      tickHandle = setInterval(updateClock, 1000);
    } else {
      // Capture both clocks while still running, then stop.
      totalBeforePause = currentTotal();
      splitBeforePause = currentSplit();
      running = false;
      clearInterval(tickHandle);
      setStartLabel(false);
      updateClock();
    }
    showLaps();
  }

  // Button 2: Lap. Records the current split, then pauses both timers and
  // resets the split back to 0, leaving the total frozen at its value.
  function recordLap() {
    var split = currentSplit();
    if (split > 0) {
      laps.push(split);
    }
    totalBeforePause = currentTotal();
    splitBeforePause = 0;
    running = false;
    clearInterval(tickHandle);
    setStartLabel(false);
    updateClock();
    showLaps();
  }

  // Reset is a two-step gesture: tap the main clock to "arm" it, then tap
  // the total counter to confirm. The armed state expires after 3s.
  function armReset() {
    resetArmed = true;
    if (resetArmTimer) { clearTimeout(resetArmTimer); }
    resetArmTimer = setTimeout(function () { resetArmed = false; }, 3000);
  }

  function confirmReset() {
    if (resetArmed) {
      resetArmed = false;
      if (resetArmTimer) { clearTimeout(resetArmTimer); }
      resetAll();
    }
  }

  // Reset: zeroes both timers, clears laps, and stops.
  function resetAll() {
    running = false;
    clearInterval(tickHandle);
    totalBeforePause = 0;
    splitBeforePause = 0;
    laps = [];
    setStartLabel(false);
    updateClock();
    if (lapsHideTimer) { clearTimeout(lapsHideTimer); }
    hideLaps();
  }

  // Stop event bubbling so a menu button tap does not also dismiss the
  // parent overlay (old WebKit uses cancelBubble).
  function stopBubble(e) {
    e = e || window.event;
    if (e) {
      if (e.stopPropagation) { e.stopPropagation(); }
      e.cancelBubble = true;
    }
  }

  // Top tap toggles a full-history overlay (lap menu). Includes an
  // "Adjust stopwatch" action above the lap list. If Adjust is open,
  // the same tap dismisses it first.
  function toggleHistory() {
    var a = document.getElementById("adjust");
    if (a.style.display === "block") {
      hideAdjust();
      return;
    }
    var h = document.getElementById("history");
    if (h.style.display === "block") {
      h.style.display = "none";
      return;
    }
    var html = "<div class='menuInfo'>Total  <span id='historyTotal'>" +
      formatTime(currentTotal()) + "</span></div>";
    html += "<div class='menuBtn' onclick='openAdjust(event)'>Adjust stopwatch</div>";
    if (laps.length === 0) {
      html += "<div>No laps yet</div>";
    } else {
      for (var i = laps.length - 1; i >= 0; i--) {
        html += "<div>Lap " + (i + 1) + "  " + formatTime(laps[i]) + "</div>";
      }
    }
    h.innerHTML = html;
    h.style.display = "block";
  }

  function hideHistory() {
    document.getElementById("history").style.display = "none";
  }

  // Open the Adjust stopwatch menu. The draft starts at zero (independent
  // of the current total); presets and +/- steps only build the draft, and
  // nothing is applied to the stopwatch until "Set to" is tapped.
  function openAdjust(e) {
    stopBubble(e);
    hideHistory();
    adjustDraftMs = 0;
    renderAdjust();
    document.getElementById("adjust").style.display = "block";
  }

  function hideAdjust() {
    document.getElementById("adjust").style.display = "none";
  }

  function renderAdjust() {
    // Top row: centered Total with a close (X) button on the right.
    var html = "<div class='topRow'>";
    html += "<div class='topCell topSide'></div>";
    html += "<div class='topCell'>Total  <span id='adjustTotal'>" +
      formatTime(currentTotal()) + "</span></div>";
    html += "<div class='topCell topSide topX' onclick='hideAdjust()'>\u2715</div>";
    html += "</div>";
    // Presets only load the draft; they do not change the stopwatch yet.
    html += "<div class='stepRow'>";
    html += "<div class='stepBtn' onclick='setDraft(30 * 60 * 1000)'>30m</div>";
    html += "<div class='stepBtn' onclick='setDraft(60 * 60 * 1000)'>1h</div>";
    html += "<div class='stepBtn' onclick='setDraft(120 * 60 * 1000)'>2h</div>";
    html += "</div>";
    // One row per unit: minus on the left, plus on the right.
    html += adjustStepRow(3600, "1h");
    html += adjustStepRow(600, "10m");
    html += adjustStepRow(60, "1m");
    html += adjustStepRow(10, "10s");
    html += adjustStepRow(1, "1s");
    html += "<div class='stepRow'>";
    html += "<div class='stepBtn' onclick='applyTotalTime(adjustDraftMs)'>Set to " +
      formatTime(adjustDraftMs) + "</div>";
    html += "</div>";
    document.getElementById("adjust").innerHTML = html;
  }

  // Build one +/- row for a single unit (e.g. seconds is 1, label "1s").
  function adjustStepRow(seconds, label) {
    return "<div class='stepRow'>" +
      "<div class='stepBtn' onclick='nudgeAdjust(" + (-seconds) + ")'>-" + label + "</div>" +
      "<div class='stepBtn' onclick='nudgeAdjust(" + seconds + ")'>+" + label + "</div>" +
      "</div>";
  }

  // Load a preset amount into the draft without touching the stopwatch.
  function setDraft(ms) {
    adjustDraftMs = ms < 0 ? 0 : ms;
    renderAdjust();
  }

  // Change the custom draft by deltaSeconds (clamped at 0).
  function nudgeAdjust(deltaSeconds) {
    adjustDraftMs += deltaSeconds * 1000;
    if (adjustDraftMs < 0) { adjustDraftMs = 0; }
    renderAdjust();
  }

  // Set the stopwatch total to a specific time. Pauses both clocks and
  // zeroes the split so the next lap starts clean from the new total.
  function applyTotalTime(ms) {
    if (ms < 0) { ms = 0; }
    running = false;
    clearInterval(tickHandle);
    totalBeforePause = ms;
    splitBeforePause = 0;
    setStartLabel(false);
    updateClock();
    hideAdjust();
    hideHistory();
    showLaps();
  }

  // Rotate the app 90 degrees clockwise (Version B) so the content reads
  // upright with the left edge at the bottom. Sized in pixels because the
  // old Kindle browser has no vh/vw units and ignores the Fullscreen /
  // orientation APIs.
  function rotateApp() {
    var wrap = document.getElementById("wrap");
    var de = document.documentElement;
    // Read the viewport defensively; fall back to the Paperwhite 4's real
    // visible CSS viewport (~758 x 899) if the browser reports nothing.
    var w = window.innerWidth || de.clientWidth || 758;
    var h = window.innerHeight || de.clientHeight || 899;
    // After a 90deg rotation the box's width/height are swapped.
    wrap.style.width = h + "px";
    wrap.style.height = w + "px";
    var t = "translateX(" + w + "px) rotate(90deg)";
    wrap.style.webkitTransform = t;
    wrap.style.transform = t;
    // Content width available to the numbers (wrap width minus its padding).
    availWidth = h - 32;
  }

  window.onresize = function () {
    rotateApp();
    // Force a refit of the numbers to the new width.
    lastSplitLen = -1;
    lastTotalLen = -1;
    updateClock();
  };

  rotateApp();
  updateClock();
  renderLapButton();
</script>
</body>
</html>
